name: Release Please

# Observes conventional commits on main and opens / updates a
# "chore(main): release X.Y.Z" PR that bumps every version manifest
# (package.json + src-tauri/tauri.conf.json + src-tauri/Cargo.toml +
# README badge) and regenerates CHANGELOG.md. Merging that PR creates
# the `vX.Y.Z` tag, which fires release.yml on the existing tag
# trigger — so the AUR / Winget / COPR pipeline keeps working
# unchanged downstream.
#
# Cargo.lock is bumped by a companion workflow
# (release-please-bump-lockfile.yml) that listens to the
# release-please PR being opened / synchronized — release-please
# can't bump Cargo.lock natively because it's regenerated by cargo.
#
# **Migrated 2026-05 from `googleapis/release-please-action@v5.0.0`
# (deprecated, bundling an older release-please library) to the
# CLI directly because the action started returning persistent
# 401 "Bad credentials" on its GitHub API calls. The CLI uses the
# same `GITHUB_TOKEN` cleanly. Behaviour is identical from the
# caller's perspective: same release PR branch
# (`release-please--branches--main--components--waveflow`), same
# `github-actions[bot]` author, so the lockfile-build companion
# workflow keeps gating correctly on `startsWith(head_ref,
# 'release-please--')`.**

"on":
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      # Phase A — open / update the release PR. Idempotent: re-runs
      # on every push, only mutates GitHub when something changed.
      - name: Update release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes release-please@17 release-pr \
            --token="${GITHUB_TOKEN}" \
            --repo-url="${GITHUB_REPOSITORY}" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json

      # Phase B — when the head commit IS the release PR's merge
      # commit, cut the GitHub release + tag. No-op on every other
      # push, so we can run both phases unconditionally.
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes release-please@17 github-release \
            --token="${GITHUB_TOKEN}" \
            --repo-url="${GITHUB_REPOSITORY}" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json
