name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '34 7 * * 4'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v3.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'

  analyze-js:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended
          config: |
            paths-ignore:
              - 'dist/**'
              - 'node_modules/**'
              - 'src-tauri/target/**'
              - 'src-tauri/**'
              - 'bun.lock'
              - '**/*.config.ts'
              - '**/*.config.js'
              - '**/*.config.mjs'
              - '**/*.config.cjs'

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  analyze-rust:
    name: Analyze (rust)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          queries: security-extended
          config: |
            paths-ignore:
              # Vendored glib 0.18.5 with RUSTSEC-2024-0429 backported
              # (see src-tauri/vendor/glib-0.18.5/PATCHES.md). We don't
              # review third-party upstream through CodeQL, and Rust
              # unsafe blocks raise large amounts of false positives.
              - 'src-tauri/vendor/**'
              - 'src-tauri/target/**'

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"

  analyze-rust-skip:
    name: Analyze (rust)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust != 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Create empty SARIF
        run: |
          cat > empty.sarif <<'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": { "driver": { "name": "CodeQL", "rules": [] } },
                "results": []
              }
            ]
          }
          EOF
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: empty.sarif
          category: "/language:rust"
