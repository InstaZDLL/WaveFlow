name: Build Cargo.lock for release-please PR

# Unprivileged half of the release-please-PR Cargo.lock pipeline.
#
# release-please-action knows how to update Cargo.toml (via the
# `toml` extra-file in release-please-config.json), but it can't
# touch Cargo.lock — that file is regenerated by cargo from
# Cargo.toml + the dep graph and can't be patched by JSONPath /
# regex tooling.
#
# This file runs in an *unprivileged* `pull_request` context
# (default `contents: read` token, no secrets reachable), runs
# `cargo check` to refresh Cargo.lock against the bumped
# Cargo.toml, and uploads the resulting file as an artifact along
# with the PR metadata.
#
# The companion `release-please-bump-lockfile.yml` workflow runs in
# a privileged `workflow_run` context after this one finishes,
# validates the artifact, then pushes the lockfile back to the PR
# branch via the GitHub API — **without ever checking out the PR
# branch in privileged context**. This split is what CodeQL's
# `actions/untrusted-checkout/critical` rule asks for: privileged
# jobs must not execute code from untrusted refs (and a release-
# please PR branch is "untrusted" by CodeQL's definition because
# in principle a maintainer could push arbitrary code to it before
# the workflow fires).

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    # Same author+branch gate as before, but here it's only a
    # cost-saving filter — the security boundary lives in the
    # privileged workflow's validation step.
    if: >-
      startsWith(github.head_ref, 'release-please--') &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target
          key: release-please-lockfile

      - name: Install Linux system deps (for cargo check)
        # cargo check on src-tauri still needs the webkit / soup
        # headers to resolve the dep graph even though we're not
        # actually building anything.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            pkg-config

      - name: Refresh Cargo.lock against bumped Cargo.toml
        run: cargo check --manifest-path src-tauri/Cargo.toml --workspace --all-targets

      - name: Stage artifact (Cargo.lock + PR metadata)
        # Bundle the refreshed Cargo.lock alongside the PR number,
        # branch name, and head SHA so the privileged workflow can
        # (a) validate the PR is still the legitimate release-please
        # PR and (b) detect head-moved races before pushing.
        #
        # Values are piped through `env:` rather than interpolated
        # straight into the shell — `head.ref` is attacker-controlled
        # (any maintainer can push a branch named e.g. `$(rm -rf /)`)
        # and `${{ … }}` substitution before the shell sees the line
        # would let that string execute as code. The `env:` form makes
        # them ordinary shell variables that the runner quotes safely.
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p artifact
          cp src-tauri/Cargo.lock artifact/Cargo.lock
          printf '%s' "$PR_NUMBER" > artifact/pr_number
          printf '%s' "$PR_BRANCH" > artifact/pr_branch
          printf '%s' "$PR_HEAD_SHA" > artifact/pr_head_sha

      - name: Upload artifact for privileged push workflow
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-please-lockfile
          path: artifact/
          retention-days: 1
          if-no-files-found: error
