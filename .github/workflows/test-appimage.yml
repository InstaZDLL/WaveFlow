name: Test AppImage build

# Manual-only workflow used to produce a CI-built AppImage from any
# branch for local testing. Mirrors the Linux portion of release.yml
# (same OS image, same apt deps, same Rust/Bun setup) so the artifact
# is directly comparable to what real releases ship, without going
# through tag + signing + publication.
#
# Run via Actions tab → "Test AppImage build" → "Run workflow" → pick a branch.
# Then download the artifact from the run summary.

on:
  workflow_dispatch:

# Least-privilege default: the workflow only checks out the repo and
# uploads an artifact (the artifact API doesn't require additional
# GITHUB_TOKEN scopes). Keeps the token read-only even if the
# repo/org default is read-write.
permissions:
  contents: read

jobs:
  appimage:
    name: Build AppImage (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            libasound2-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target
          key: linux-test-appimage

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Report runner environment
        run: |
          echo "OS:"
          cat /etc/os-release
          echo
          echo "webkit2gtk:"
          dpkg -l | grep -E 'webkit2gtk|javascriptcoregtk' || true
          echo
          echo "rustc:"
          rustc --version

      - name: Build AppImage
        # Override `bundle.createUpdaterArtifacts` to skip the post-bundle
        # updater signing step. The test workflow doesn't have access to
        # the TAURI_SIGNING_* secrets, and the signed payload is not
        # needed for local AppImage validation — without this override
        # the build fails after producing the AppImage, so the upload
        # step never runs.
        run: bun run tauri build --bundles appimage -c '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: WaveFlow-AppImage-${{ github.sha }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14
