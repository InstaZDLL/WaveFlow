name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same PR or branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        # Tauri 2 on Linux still uses GTK 3 + WebKitGTK; cpal needs ALSA
        # development headers; the rest mirrors what `cargo check` will
        # link against transitively from the Tauri runtime.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      - name: TypeScript
        run: bun run typecheck

      - name: Vite production build
        run: bun run build
