name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel in-progress runs for the same PR or branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache APT packages
        if: runner.os == 'Linux'
        # Tauri 2 on Linux still uses GTK 3 + WebKitGTK; cpal needs ALSA
        # development headers; the rest mirrors what `cargo check` will
        # link against transitively from the Tauri runtime.
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: >-
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev
            libayatana-appindicator3-dev librsvg2-dev libasound2-dev
            libssl-dev pkg-config
          version: v1

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: bun install
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      - name: TypeScript
        run: bun run typecheck

      - name: Vite production build
        run: bun run build
