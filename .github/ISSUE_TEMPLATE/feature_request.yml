name: Feature request
description: Suggest a new capability, an existing-feature improvement, or a UX polish for WaveFlow.
title: "feat: <one-line summary>"
labels: ["type:feat"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. WaveFlow is opinionated — features that fit the local-first / Spotify-style desk-player vision land much faster than those that don't. The more you can justify *why* this matters, the easier it is to scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow / pain point you're trying to address. Skip the solution for now — focus on the why.
      placeholder: |
        When I listen to live recordings of a concert, the auto-crossfade between consecutive tracks smears the applause and the next song's intro. The smart-crossfade-by-album already covers studio LPs but not concert bootlegs that share an artist + year but lack a unified `album` tag.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? UI sketches, command names, or pseudocode all welcome.
      placeholder: |
        Add a "Suppress crossfade if next track was released within 1 hour and shares the artist" heuristic, gated behind a new toggle next to the existing smart-crossfade switch.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem, and why they're worse than your proposal.

  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      description: How big is this in your head? Helps with triage, not binding.
      options:
        - "Small (one card / one command / one menu entry)"
        - "Medium (cross-cutting — touches backend + frontend + i18n)"
        - "Large (new view / new data model / breaking schema change)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links to similar features in other players (Apple Music, Spotify, Foobar2000, etc.), screenshots, related issues.
