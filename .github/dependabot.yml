version: 2

updates:
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - bun
    commit-message:
      prefix: chore
    groups:
      bun-patch-and-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "06:10"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - cargo
    commit-message:
      prefix: chore
    groups:
      cargo-patch-and-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
    groups:
      github-actions-all:
        patterns:
          - "*"
