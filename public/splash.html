<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaveFlow</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        cursor: default;
      }
      .card {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(
            120% 80% at 50% 0%,
            rgba(16, 185, 129, 0.18) 0%,
            rgba(16, 185, 129, 0) 60%
          ),
          #121212;
        border-radius: 14px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55);
      }
      .logo {
        width: 96px;
        height: 96px;
        display: block;
        filter: drop-shadow(0 6px 18px rgba(16, 185, 129, 0.35));
      }
      .wordmark {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.4px;
        color: #f4f4f5;
      }
      .bar {
        position: relative;
        width: 180px;
        height: 3px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .bar::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background: linear-gradient(
          90deg,
          rgba(16, 185, 129, 0) 0%,
          #10b981 50%,
          rgba(16, 185, 129, 0) 100%
        );
        animation: slide 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .bar::after {
          animation: none;
          width: 100%;
          opacity: 0.6;
        }
      }
    </style>
  </head>
  <body>
    <div class="card" role="status" aria-label="Loading WaveFlow">
      <svg
        class="logo"
        width="256"
        height="256"
        viewBox="0 0 256 256"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <defs>
          <linearGradient
            id="waveflowGrad"
            x1="0"
            y1="0"
            x2="256"
            y2="256"
            gradientUnits="userSpaceOnUse"
          >
            <stop stop-color="#34D399" />
            <stop offset="0.5" stop-color="#10B981" />
            <stop offset="1" stop-color="#059669" />
          </linearGradient>
        </defs>
        <rect
          x="36"
          y="58"
          width="24"
          height="140"
          rx="12"
          fill="url(#waveflowGrad)"
        />
        <rect
          x="76"
          y="88"
          width="24"
          height="80"
          rx="12"
          fill="url(#waveflowGrad)"
        />
        <rect
          x="116"
          y="108"
          width="24"
          height="40"
          rx="12"
          fill="url(#waveflowGrad)"
        />
        <rect
          x="156"
          y="88"
          width="24"
          height="80"
          rx="12"
          fill="url(#waveflowGrad)"
        />
        <rect
          x="196"
          y="58"
          width="24"
          height="140"
          rx="12"
          fill="url(#waveflowGrad)"
        />
      </svg>
      <div class="wordmark">WaveFlow</div>
      <div class="bar" aria-hidden="true"></div>
    </div>
  </body>
</html>
