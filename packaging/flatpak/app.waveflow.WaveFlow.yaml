# WaveFlow Flatpak manifest
#
# Status: build path resolved end-to-end; only the source `commit:` is
# left to pin at each release tag.
#
# Resolved:
#   * Runtime: org.gnome.Platform//50 ships both webkit2gtk-4.1 (what
#     Tauri 2.11 links against) AND webkitgtk-6.0 side-by-side. No
#     custom webkit module needed.
#   * Tauri auto-updater is gated behind the `updater` Cargo feature
#     (default-on). The build invocation below passes
#     `--no-default-features` so the Flatpak compiles it out and
#     `flatpak update` owns the upgrade flow uncontested.
#   * Offline sources are pre-generated by
#     `packaging/flatpak/generate-sources.sh` and committed to
#     `packaging/flatpak/generated/` — re-run after any change to
#     `src-tauri/Cargo.lock` or `package.json`.
#   * libayatana-appindicator (system tray) isn't in the GNOME 50
#     runtime; bundled inline as a module before waveflow.

app-id: app.waveflow.WaveFlow
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  # rust-stable bundles rustc + cargo + clang + lld; covers every
  # compile-time Rust crate WaveFlow depends on. node22 is for the
  # frontend (Vite, tsc, tauri-cli).
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: waveflow

# Sandbox permissions ------------------------------------------------------
finish-args:
  # Display + GPU + input
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

  # Audio — PulseAudio socket also covers PipeWire's pulse-compat layer,
  # which is what runs on every recent GNOME / KDE / Fedora install.
  # Direct ALSA device enumeration (the cpal output-device picker's
  # human-readable names on Linux) is degraded inside the sandbox
  # without `--device=all`, but playback still works through the PA
  # socket. We take that downgrade rather than ask for raw /dev/snd
  # access, which Flathub reviewers reject on sight.
  - --socket=pulseaudio

  # Network — required for Deezer / Last.fm / LRCLIB / Discord RPC
  # (process-wide offline mode in WaveFlow short-circuits these at the
  # application layer; the sandbox capability still has to be granted)
  - --share=network

  # File access for music libraries.
  # xdg-music covers ~/Music; users with libraries elsewhere can grant
  # additional dirs via Flatseal or `flatpak override`. Avoid host=ro
  # in the manifest itself so the Flathub reviewers don't push back.
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
  - --filesystem=xdg-videos:ro
  # Portal-based file picker for arbitrary folder add (FileChooser portal)
  - --talk-name=org.freedesktop.portal.FileChooser

  # MPRIS (souvlaki) — D-Bus own-name for the media control bridge
  - --own-name=org.mpris.MediaPlayer2.WaveFlow
  - --own-name=org.mpris.MediaPlayer2.waveflow

  # System tray (AppIndicator)
  - --talk-name=org.kde.StatusNotifierWatcher

  # Native notifications
  - --talk-name=org.freedesktop.Notifications

  # Discord RPC via named pipe at $XDG_RUNTIME_DIR/discord-ipc-*
  - --filesystem=xdg-run/app/com.discordapp.Discord:ro
  - --filesystem=xdg-run/discord-ipc-0
  - --filesystem=xdg-run/discord-ipc-1
  - --filesystem=xdg-run/discord-ipc-2
  - --filesystem=xdg-run/discord-ipc-3

  # Persist Tauri config + per-profile databases under XDG_CONFIG_HOME
  # (Tauri uses ~/.config/<identifier>/ on Linux by default — already
  # inside the Flatpak sandbox at ~/.var/app/app.waveflow.WaveFlow/config/).

# Build modules ------------------------------------------------------------
modules:
  # libayatana-appindicator / libappindicator-gtk3 — Tauri's tray-icon
  # crate dlopens libayatana-appindicator3.so.1 at runtime, falling
  # back to the original Canonical libappindicator3.so.1.
  #
  # The Flathub shared-modules repo ships authoritative recipes for
  # libappindicator-gtk3 12.10 + intltool + dbus-glib + libindicator,
  # including the FTBFS patches needed for modern toolchains. We
  # vendor a frozen copy at packaging/flatpak/shared-modules/ rather
  # than pulling shared-modules in as a git submodule — keeps the
  # main repo submodule-free, and regen is straightforward (just
  # re-fetch from flathub/shared-modules master).
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: waveflow
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
      append-ld-library-path: /usr/lib/sdk/rust-stable/lib
      env:
        # Vendored cargo config + crates land in $CARGO_HOME/cargo (the
        # `config` file and the `vendor/` dir) per flatpak-cargo-generator
        # convention. CARGO_NET_OFFLINE makes any accidental network
        # fetch a hard error instead of a silent stall.
        CARGO_HOME: /run/build/waveflow/cargo
        CARGO_NET_OFFLINE: 'true'
        # npm offline knobs. The cache dir matches where
        # flatpak-node-generator places its content-addressed store
        # (flatpak-node/npm-cache/_cacache/...).
        npm_config_offline: 'true'
        npm_config_audit: 'false'
        npm_config_fund: 'false'
        npm_config_loglevel: 'error'
    build-commands:
      # Swap bun.lock for the npm-flavored lockfile produced by
      # generate-sources.sh. Same package.json, same registry, same
      # tarball hashes — just npm's lockfile schema so `npm ci` can
      # consume the offline cache that flatpak-node-generator built.
      - cp packaging/flatpak/generated/package-lock.json .

      # Install frontend deps from the vendored npm cache. HOME=$PWD
      # keeps npm's user state (logs, prefix) inside the build dir
      # instead of writing to the sandbox HOME, which speeds up clean
      # rebuilds and avoids leaking into other modules.
      - HOME=$PWD npm ci --offline --cache flatpak-node/npm-cache --prefix .

      # Tauri 2 build:
      #   --no-bundle           Skip installer creation (.deb / .rpm /
      #                         .AppImage). Flatpak repackages the bare
      #                         binary, the bundler step is wasted work.
      #   --no-sign             Defense-in-depth: with --no-bundle the
      #                         signing path isn't reached anyway, but
      #                         this makes "this build is unsigned"
      #                         explicit and survives any future change
      #                         to --no-bundle semantics.
      #   --config              Override beforeBuildCommand from
      #                         `bun run build` (no bun in the sandbox)
      #                         to `npm run build`.
      #   --no-default-features Drops the `updater` Cargo feature so
      #                         tauri-plugin-updater isn't compiled in.
      #                         flatpak update owns the upgrade flow
      #                         uncontested.
      - |
        HOME=$PWD npx tauri build \
          --no-bundle \
          --no-sign \
          --config '{"build":{"beforeBuildCommand":"npm run build"}}' \
          -- --no-default-features

      # Install the binary
      - install -Dm755 src-tauri/target/release/waveflow /app/bin/waveflow

      # Icons
      - |
        for size in 32 64 128; do
          install -Dm644 src-tauri/icons/${size}x${size}.png \
            /app/share/icons/hicolor/${size}x${size}/apps/app.waveflow.WaveFlow.png
        done
        install -Dm644 src-tauri/icons/128x128@2x.png \
          /app/share/icons/hicolor/256x256/apps/app.waveflow.WaveFlow.png

      # Desktop entry + AppStream metainfo
      - install -Dm644 packaging/flatpak/app.waveflow.WaveFlow.desktop /app/share/applications/app.waveflow.WaveFlow.desktop
      - install -Dm644 packaging/flatpak/app.waveflow.WaveFlow.metainfo.xml /app/share/metainfo/app.waveflow.WaveFlow.metainfo.xml

    sources:
      # The project source tree.
      #
      # For Flathub submission, this becomes:
      #   - type: git
      #     url: https://github.com/InstaZDLL/WaveFlow.git
      #     tag: v1.3.0
      #     commit: <pin at release tag>
      #
      # For local `flatpak-builder` testing the `type: dir` form is
      # faster — flatpak-builder copies the working tree as-is, no
      # network round-trip. The skip list excludes the dev artefacts
      # that would otherwise inflate the build dir by 50+ GB
      # (src-tauri/target alone is typically 30-60 GB after dev work)
      # and node_modules / dist / .git which the build re-creates.
      - type: dir
        path: ../..
        skip:
          - node_modules
          - dist
          - target
          - src-tauri/target
          - src-tauri/gen
          - .git
          - .flatpak-builder
          - packaging/flatpak/.cache
          - packaging/flatpak/.flatpak-builder
          - coverage
          - .eslintcache
          - .vite

      # Vendored Rust deps (1483 entries: 741 crate tarballs + their
      # .cargo-checksum.json inline siblings + final cargo/config).
      # Regenerate via packaging/flatpak/generate-sources.sh after any
      # change to src-tauri/Cargo.lock.
      - generated/cargo-sources.json

      # Vendored npm packages (668 entries: 333 tarballs + cacache
      # metadata). Regenerate via the same script after any change to
      # package.json.
      - generated/node-sources.json
