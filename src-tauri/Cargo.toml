[package]
name = "waveflow"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "waveflow_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Database
sqlx = { version = "0.8", features = [
    "runtime-tokio",
    "sqlite",
    "migrate",
    "macros",
    "chrono",
] }

# Errors and logging
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Library scanning
walkdir = "2"
lofty = "0.22"
blake3 = "1"

# Audio playback: symphonia decodes, cpal outputs, rubato resamples,
# rtrb is the SPSC ring between decoder thread and audio callback,
# crossbeam-channel carries AudioCmd from tokio commands to the decoder.
symphonia = { version = "0.5", default-features = false, features = [
    "mp3",
    "flac",
    "wav",
    "vorbis",
    "ogg",
    "aac",
    "alac",
    "isomp4",
    "pcm",
] }
cpal = "0.15"
rubato = "0.15"
rtrb = "0.3"
crossbeam-channel = "0.5"

# HTTP client for Deezer public API metadata enrichment
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Regex for stripping HTML from Last.fm bio summaries
regex = "1"
