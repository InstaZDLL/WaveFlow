<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#240c47"/>
      <stop offset="100%" stop-color="#0d041a"/>
    </linearGradient>

    <linearGradient id="infGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3377"/>
      <stop offset="50%" stop-color="#9933ff"/>
      <stop offset="100%" stop-color="#33ccff"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComponentTransfer in="blur" result="glow1">
         <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="url(#bg)"/>

  <g fill="#ffffff" opacity="0.04">
    <rect x="80" y="190" width="20" height="60" rx="10"/>
    <rect x="120" y="150" width="20" height="140" rx="10"/>
    <rect x="160" y="80" width="20" height="280" rx="10"/>
    <rect x="200" y="130" width="20" height="180" rx="10"/>
    <rect x="240" y="60" width="20" height="320" rx="10"/>
    <rect x="280" y="120" width="20" height="200" rx="10"/>
    <rect x="320" y="90" width="20" height="260" rx="10"/>
    <rect x="360" y="160" width="20" height="120" rx="10"/>
    <rect x="400" y="200" width="20" height="40" rx="10"/>
  </g>

  <g filter="url(#glow)">
    <path d="M 130 250
             C 130 160, 250 160, 250 250
             C 250 340, 370 340, 370 250
             C 370 160, 250 160, 250 250
             C 250 340, 130 340, 130 250 Z"
          fill="none"
          stroke="url(#infGrad)"
          stroke-width="40"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <path d="M 130 250
           C 130 160, 250 160, 250 250
           C 250 340, 370 340, 370 250
           C 370 160, 250 160, 250 250
           C 250 340, 130 340, 130 250 Z"
        fill="none"
        stroke="#ffffff"
        stroke-width="4"
        opacity="0.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
