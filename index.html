<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveFlow</title>
  </head>

  <body>
    <!--
      Theme bootstrap — paints the right mode (dark class + data-theme +
      ambient background) before React mounts so a fresh boot doesn't
      flash white when the default theme is dark. Keeps it minimal: only
      the dark class + ambient color need to be right on the first paint;
      the full accent palette is hydrated by `ThemeProvider`'s effect a
      few ms later, which is invisible against an already-correct bg.
      Mirrors `themes.ts` — `LIGHT_IDS` lists every light preset (6),
      everything else is dark (8). Keep the two tables in sync if a
      preset is added / removed.
    -->
    <script>
      (function () {
        try {
          var id =
            localStorage.getItem("waveflow.theme.id") ||
            (localStorage.getItem("waveflow.theme.is_dark") === "false"
              ? "default"
              : "default-dark");
          var LIGHT_IDS = {
            default: 1,
            "midnight-light": 1,
            "sunset-light": 1,
            "lavender-light": 1,
            "crimson-light": 1,
            "ocean-light": 1,
          };
          var ambient =
            {
              default: "#ffffff",
              "midnight-light": "#e0e7ff",
              "sunset-light": "#fef3c7",
              "lavender-light": "#ede9fe",
              "crimson-light": "#ffe4e6",
              "ocean-light": "#e0f2fe",
              "default-dark": "#121212",
              oled: "#000000",
              midnight: "#0b1020",
              sunset: "#1a0e08",
              lavender: "#15101e",
              crimson: "#19090c",
              ocean: "#081420",
              neon: "#1a0a18",
            }[id] || "#121212";
          var root = document.documentElement;
          root.setAttribute("data-theme", id);
          root.style.setProperty("--ambient-bg", ambient);
          if (!LIGHT_IDS[id]) root.classList.add("dark");
          // Skin bootstrap — paint the right `data-skin` before
          // React mounts so font / radius / density tokens used
          // by the very first paint surfaces (sidebar, topbar)
          // don't flicker from the default Studio metrics to
          // Editorial on hydration. The full skin tokens are
          // hydrated by `SkinProvider`'s effect a few ms later;
          // only the attribute needs to be right on first paint
          // because `@theme inline` in app.css resolves the
          // attribute-selector overrides synchronously with the
          // first CSS pass.
          var skin = localStorage.getItem("waveflow.skin.id") || "studio";
          root.setAttribute("data-skin", skin);
        } catch (_) {
          // localStorage unavailable — fall through to :root defaults.
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
