<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveFlow</title>
  </head>

  <body>
    <!--
      Theme bootstrap — paints the right mode (dark class + data-theme +
      ambient background) before React mounts so a fresh boot doesn't
      flash white when the default theme is dark. Keeps it minimal: only
      the dark class + ambient color need to be right on the first paint;
      the full accent palette is hydrated by `ThemeProvider`'s effect a
      few ms later, which is invisible against an already-correct bg.
      Mirrors `themes.ts` — only `default` is light, every other preset
      (including the default `default-dark`) is dark.
    -->
    <script>
      (function () {
        try {
          var id =
            localStorage.getItem("waveflow.theme.id") ||
            (localStorage.getItem("waveflow.theme.is_dark") === "false"
              ? "default"
              : "default-dark");
          var ambient = {
            "default": "#ffffff",
            "default-dark": "#121212",
            "oled": "#000000",
            "midnight": "#0b1020",
            "forest": "#0c1612",
            "sunset": "#1a0e08",
            "lavender": "#15101e",
            "crimson": "#19090c",
            "ocean": "#081420",
            "neon": "#1a0a18",
          }[id] || "#121212";
          var root = document.documentElement;
          root.setAttribute("data-theme", id);
          root.style.setProperty("--ambient-bg", ambient);
          if (id !== "default") root.classList.add("dark");
        } catch (_) {
          // localStorage unavailable — fall through to :root defaults.
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
